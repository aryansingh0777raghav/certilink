<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CertiLink — Your Certificate Portfolio</title>
  <meta name="description" content="Upload certificates to Google Drive and share your achievement portfolio with a single link." />
  <meta property="og:title" content="CertiLink" />
  <meta property="og:description" content="Your verified certificate portfolio, powered by Google Drive." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>



  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            display: ['Syne', 'sans-serif'],
            mono: ['DM Mono', 'monospace'],
            body: ['DM Sans', 'sans-serif'],
          },
          colors: {
            ink: '#0D0D12',
            paper: '#F4F1EB',
            zinc: { 950: '#09090b' },
            amber: { 350: '#FBD07A' },
          },
          animation: {
            'fade-up': 'fadeUp 0.5s ease forwards',
            'pulse-slow': 'pulse 3s ease-in-out infinite',
          },
          keyframes: {
            fadeUp: {
              from: { opacity: 0, transform: 'translateY(16px)' },
              to:   { opacity: 1, transform: 'translateY(0)' },
            }
          }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="css/app.css" />
</head>
<body class="font-body bg-ink text-paper min-h-screen">

  <!-- Theme toggle -->
  <button id="themeToggle" title="Toggle dark/light mode"
    class="fixed top-4 right-4 z-50 w-9 h-9 rounded-full border border-white/10 bg-white/5 backdrop-blur flex items-center justify-center hover:bg-white/10 transition-all">
    <span id="themeIcon">🌙</span>
  </button>

  <!-- App root — pages injected here -->
  <div id="app"></div>

  <!-- Toast container -->
  <div id="toastContainer" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2 pointer-events-none"></div>

  <!-- Floating Feedback Button -->
  <a id="feedbackBtn"
    href="mailto:aryansingh979211@gmail.com?subject=CertiLink%20Feedback%20/%20Issue&body=Hi%20Aryan%2C%0A%0A%5BDescribe%20your%20feedback%20or%20issue%20here%5D%0A%0AThanks!"
    title="Send feedback or report an issue"
    class="fixed bottom-6 left-6 z-50 flex items-center gap-2 px-4 py-2 rounded-full text-xs font-mono font-medium backdrop-blur transition-all"
    style="background: rgba(245,200,66,0.12); border: 1px solid rgba(245,200,66,0.3); color: #F5C842;"
    onmouseover="this.style.background='rgba(245,200,66,0.22)'"
    onmouseout="this.style.background='rgba(245,200,66,0.12)'">
    💬 <span class="hidden sm:inline">Feedback / Issue</span><span class="sm:hidden">Feedback</span>
  </a>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/drive.js"></script>
  <script src="js/router.js"></script>
  <script src="js/pages/home.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/profile.js"></script>
  <script src="js/pages/privacy.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
